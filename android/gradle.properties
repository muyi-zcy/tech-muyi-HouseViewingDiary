org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation breaks when the project (e.g. on J:) and Pub cache (e.g. on C:)
# are on different Windows drive roots; webview_flutter_android then fails to compile and
# GeneratedPluginRegistrant cannot resolve WebViewFlutterPlugin.
kotlin.incremental=false
